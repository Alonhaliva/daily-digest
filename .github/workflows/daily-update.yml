name: Daily News Update

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news & rebuild index.html
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Commit & push updated site
        run: |
          git config user.name  "Daily Digest Bot"
          git config user.email "bot@daily-digest.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🗞️ Daily update $(date +'%Y-%m-%d')"
          git push
